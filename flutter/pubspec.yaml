name: assemblydb
description: High-performance embedded key-value database powered by pure AArch64 assembly. Direct FFI bindings to AssemblyDB.
version: 0.1.0
repository: https://github.com/santoshakil/assemblydb

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  ffi: ^2.1.0
  flutter:
    sdk: flutter

dev_dependencies:
  ffigen: ^20.1.1
  flutter_test:
    sdk: flutter
  test: ^1.25.0
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      linux:
        ffiPlugin: true
